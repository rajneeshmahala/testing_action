name: Feature → WIP Branch Manager

on:
  push:
    branches:
      - 'feature/*'

permissions:
  contents: write

jobs:
  manage-wip:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Extract & Validate Branch
        id: extract
        run: |
          SOURCE_BRANCH=${GITHUB_REF#refs/heads/}
          echo "SOURCE_BRANCH=$SOURCE_BRANCH" >> $GITHUB_ENV

          echo "Processing: $SOURCE_BRANCH"

          # Strict format: feature/<app>-xx-<number>-<team>
          if [[ ! "$SOURCE_BRANCH" =~ ^feature\/([a-zA-Z0-9]+)-([a-zA-Z0-9]+)-([0-9]+)-(team[a-zA-Z0-9]+)$ ]]; then
            echo "❌ Invalid branch format!"
            echo "Expected: feature/<app>-xx-<number>-<team>"
            exit 1
          fi

          APP=$(echo $SOURCE_BRANCH | cut -d'/' -f2 | cut -d'-' -f1)
          SPRINT=$(echo $SOURCE_BRANCH | cut -d'-' -f3)
          TEAM=$(echo $SOURCE_BRANCH | cut -d'-' -f4)

          WIP_BRANCH="wip/${APP}-${SPRINT}-${TEAM}"

          echo "APP=$APP" >> $GITHUB_ENV
          echo "SPRINT=$SPRINT" >> $GITHUB_ENV
          echo "TEAM=$TEAM" >> $GITHUB_ENV
          echo "WIP_BRANCH=$WIP_BRANCH" >> $GITHUB_ENV

          echo "✅ WIP Branch: $WIP_BRANCH"

      - name: Check if WIP branch exists
        id: check
        run: |
          git fetch origin

          if git ls-remote --exit-code --heads origin $WIP_BRANCH; then
            echo "exists=true" >> $GITHUB_OUTPUT
            echo "✅ Branch already exists → skipping creation"
          else
            echo "exists=false" >> $GITHUB_OUTPUT
            echo "🚀 Branch does not exist → will create"
          fi

      - name: Create WIP branch (only if missing)
        if: steps.check.outputs.exists == 'false'
        run: |
          echo "Creating $WIP_BRANCH from main"
          git checkout origin/main -b $WIP_BRANCH
          git push origin $WIP_BRANCH

      - name: Complete Pipeline
        run: |
          if [ "${{ steps.check.outputs.exists }}" == "true" ]; then
            echo "✔ Pipeline completed: Branch already existed"
          else
            echo "✔ Pipeline completed: Branch created"
          fi