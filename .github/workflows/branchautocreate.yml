name: Feature → WIP Branch Manager

on:
  push:
    branches:
      - 'feature/*'

permissions:
  contents: write

jobs:
  manage-wip:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Extract & Validate Branch
        id: extract
        run: |
          SOURCE_BRANCH=${GITHUB_REF#refs/heads/}
          echo "SOURCE_BRANCH=$SOURCE_BRANCH" >> $GITHUB_ENV

          echo "Processing branch: $SOURCE_BRANCH"

          # Strict format:
          # feature/<app>-xx-<number>-<team>
          if [[ ! "$SOURCE_BRANCH" =~ ^feature\/([a-zA-Z0-9]+)-([a-zA-Z0-9]+)-([0-9]+)-(team[a-zA-Z0-9]+)$ ]]; then
            echo "❌ Invalid branch format!"
            echo "Expected: feature/<app>-xx-<sprintNumber>-<teamname>"
            exit 1
          fi

          APP_NAME=$(echo $SOURCE_BRANCH | cut -d'/' -f2 | cut -d'-' -f1)
          SPRINT_NUM=$(echo $SOURCE_BRANCH | cut -d'-' -f3)
          TEAM=$(echo $SOURCE_BRANCH | cut -d'-' -f4)

          # Normalize sprint
          SPRINT="sprint${SPRINT_NUM}"

          WIP_BRANCH="wip/${APP_NAME}-${SPRINT}-${TEAM}"

          echo "APP_NAME=$APP_NAME" >> $GITHUB_ENV
          echo "SPRINT=$SPRINT" >> $GITHUB_ENV
          echo "TEAM=$TEAM" >> $GITHUB_ENV
          echo "WIP_BRANCH=$WIP_BRANCH" >> $GITHUB_ENV

          echo "✅ Parsed:"
          echo "App: $APP_NAME"
          echo "Sprint: $SPRINT"
          echo "Team: $TEAM"
          echo "WIP: $WIP_BRANCH"

      - name: Check if WIP branch exists
        id: check
        run: |
          git fetch origin

          if git ls-remote --exit-code --heads origin $WIP_BRANCH; then
            echo "exists=true" >> $GITHUB_OUTPUT
            echo "✅ Branch already exists"
          else
            echo "exists=false" >> $GITHUB_OUTPUT
            echo "🚀 Branch will be created"
          fi

      - name: Create WIP branch
        if: steps.check.outputs.exists == 'false'
        run: |
          echo "Creating $WIP_BRANCH"

          # Create from main (best practice)
          git checkout origin/main -b $WIP_BRANCH
          git push origin $WIP_BRANCH

      - name: Summary
        run: |
          echo "================================"
          echo "SOURCE: $SOURCE_BRANCH"
          echo "WIP: $WIP_BRANCH"
          echo "================================"