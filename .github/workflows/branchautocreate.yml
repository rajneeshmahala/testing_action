name: Auto PR (feature → wip dynamic)

on:
  push:
    branches:
      - 'feature/*'

jobs:
  open-pr:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configure Git
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

      # ✅ Extract app + sprint + team
      - name: Extract branch info
        id: vars
        run: |
          SOURCE_BRANCH="${GITHUB_REF#refs/heads/}"

          echo "Processing: $SOURCE_BRANCH"

          # Validate format
          if [[ ! "$SOURCE_BRANCH" =~ ^feature\/([a-zA-Z0-9]+)-([a-zA-Z0-9]+)-([0-9]+)-(team[0-9a-zA-Z]+)$ ]]; then
            echo "❌ Invalid format"
            exit 1
          fi

          APP=$(echo "$SOURCE_BRANCH" | cut -d'/' -f2 | cut -d'-' -f1)
          SPRINT=$(echo "$SOURCE_BRANCH" | cut -d'-' -f3)
          TEAM=$(echo "$SOURCE_BRANCH" | cut -d'-' -f4)

          TARGET_BRANCH="wip/${APP}-${SPRINT}-${TEAM}"

          echo "source=$SOURCE_BRANCH" >> $GITHUB_OUTPUT
          echo "target=$TARGET_BRANCH" >> $GITHUB_OUTPUT
          echo "app=$APP" >> $GITHUB_OUTPUT
          echo "sprint=$SPRINT" >> $GITHUB_OUTPUT
          echo "team=$TEAM" >> $GITHUB_OUTPUT

          echo "✅ App: $APP"
          echo "✅ Sprint: $SPRINT"
          echo "✅ Team: $TEAM"
          echo "🎯 Target: $TARGET_BRANCH"

      # ✅ Check if WIP branch exists
      - name: Check if WIP branch exists
        id: check
        run: |
          git fetch origin

          if git ls-remote --exit-code --heads origin ${{ steps.vars.outputs.target }}; then
            echo "exists=true" >> $GITHUB_OUTPUT
            echo "✅ WIP branch exists"
          else
            echo "exists=false" >> $GITHUB_OUTPUT
            echo "🚀 WIP branch will be created"
          fi

      # ✅ Create WIP branch if missing
      - name: Create WIP branch
        if: steps.check.outputs.exists == 'false'
        run: |
          TARGET=${{ steps.vars.outputs.target }}

          echo "Creating $TARGET from main"

          git checkout origin/main -b $TARGET
          git push origin $TARGET

      # ✅ Fetch target branch (after ensure exists)
      - name: Fetch target branch
        run: |
          git fetch origin ${{ steps.vars.outputs.target }}

      # ✅ Conflict check
      - name: Check merge conflict
        run: |
          SOURCE=${{ steps.vars.outputs.source }}
          TARGET=${{ steps.vars.outputs.target }}

          git checkout $SOURCE

          git merge origin/$TARGET --no-commit --no-ff || echo "MERGE_FAILED=true" >> $GITHUB_ENV

          if [ "$MERGE_FAILED" = "true" ]; then
            echo "❌ Merge conflict detected with $TARGET"
            exit 1
          else
            echo "✅ No conflicts"
          fi

          git merge --abort || true

      # ✅ Create PR
      - name: Create Pull Request
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          SOURCE=${{ steps.vars.outputs.source }}
          TARGET=${{ steps.vars.outputs.target }}

          EXISTING=$(gh pr list --base "$TARGET" --head "$SOURCE" --state open --json number --jq '.[0].number')

          if [ -z "$EXISTING" ]; then
            gh pr create \
              --base "$TARGET" \
              --head "$SOURCE" \
              --title "Auto PR: $SOURCE → $TARGET" \
              --body "🚀 Auto-created PR\n\nApp: ${{ steps.vars.outputs.app }}\nSprint: ${{ steps.vars.outputs.sprint }}\nTeam: ${{ steps.vars.outputs.team }}"
          else
            echo "✅ PR #$EXISTING already exists. Skipping."
          fi