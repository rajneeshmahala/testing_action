name: PR → WIP CI (Before Merge)

on:
  push:
  
    branches:
      - 'wip/**'

jobs:
  ci-validation:
    runs-on: ubuntu-latest

    steps:
      # ✅ Checkout with full history (fix gitleaks issue)
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # Setup Node
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      # Install dependencies
      - name: Install Dependencies
        run: npm install
      - name: SonarQube Scan
        uses: sonarsource/sonarqube-scan-action@v2
        with:
          args: >
            -Dsonar.projectKey=demo-project
            -Dsonar.sources=.
            -Dsonar.host.url=${{ secrets.SONAR_HOST_URL }}
            -Dsonar.login=${{ secrets.SONAR_TOKEN }}

      # 🔥 Quality Gate Check (IMPORTANT)
      - name: SonarQube Quality Gate
        uses: sonarsource/sonarqube-quality-gate-action@v1
        with:
          pollingTimeoutSec: 300
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
      # 🔐 Credential Scanning (FIXED)
      - name: Credential Scan (Gitleaks)
        uses: gitleaks/gitleaks-action@v2
        with:
          args: detect --no-git --source=. --redact

      # 🛡️ Vulnerability Scanning (stable)
      - name: Trivy FS Scan
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: fs
          severity: CRITICAL,HIGH
        continue-on-error: true   # 🔥 avoid blocking during R&D

      # 🧹 Linting
      - name: Lint Code
        run: npm run lint

      # 🧪 Unit Testing
      - name: Run Unit Tests
        run: npm test

      # 🔗 Integration Testing (optional)
      - name: Integration Tests
        run: npm run test:integration || echo "No integration tests configured"

      # 🏗️ Build
      - name: Build Application
        run: npm run build

      # 📊 Static Code Analysis (placeholder)
      - name: Static Code Analysis
        run: echo "Run SonarQube or CodeQL here"