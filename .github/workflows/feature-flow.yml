name: Auto PR (feature → wip dynamic team)

on:
  push:
    branches:
      - 'feature/*'

jobs:
  open-pr:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configure Git
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

      # ✅ Extract SOURCE + TEAM + TARGET dynamically
      - name: Extract branch info
        id: vars
        run: |
          SOURCE_BRANCH="${GITHUB_REF#refs/heads/}"

          # Extract team name (team1, team2, etc.)
          TEAM=$(echo "$SOURCE_BRANCH" | grep -o 'team[0-9]*')

          TARGET_BRANCH="wip/api-$TEAM"

          echo "source=$SOURCE_BRANCH" >> $GITHUB_OUTPUT
          echo "target=$TARGET_BRANCH" >> $GITHUB_OUTPUT
          echo "team=$TEAM" >> $GITHUB_OUTPUT

          echo "Source: $SOURCE_BRANCH"
          echo "Team: $TEAM"
          echo "Target: $TARGET_BRANCH"

      # ✅ Fetch target branch
      - name: Fetch target branch
        run: |
          git fetch origin ${{ steps.vars.outputs.target }}

      # ✅ Conflict check
      - name: Check merge conflict
        run: |
          git checkout ${{ steps.vars.outputs.source }}

          git merge origin/${{ steps.vars.outputs.target }} --no-commit --no-ff || echo "MERGE_FAILED=true" >> $GITHUB_ENV

          if [ "$MERGE_FAILED" = "true" ]; then
            echo "❌ Merge conflict detected with ${{ steps.vars.outputs.target }}"
            exit 1
          else
            echo "✅ No conflicts"
          fi

          git merge --abort || true

      # ✅ Create PR
      - name: Create Pull Request
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          SOURCE="${{ steps.vars.outputs.source }}"
          TARGET="${{ steps.vars.outputs.target }}"

          EXISTING=$(gh pr list --base "$TARGET" --head "$SOURCE" --state open --json number --jq '.[0].number')

          if [ -z "$EXISTING" ]; then
            gh pr create \
              --base "$TARGET" \
              --head "$SOURCE" \
              --title "Auto PR: $SOURCE → $TARGET" \
              --body "Automated PR for $TARGET (team-based flow)."
          else
            echo "PR #$EXISTING already exists. Skipping."
          fi
