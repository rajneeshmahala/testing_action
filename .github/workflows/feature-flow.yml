name: Feature → WIP PR

on:
  push:
    branches:
      - 'feature/*'

permissions:
  contents: write
  pull-requests: write

jobs:
  create-pr:
    runs-on: ubuntu-latest

    steps:
      # Checkout code
      - name: Checkout
        uses: actions/checkout@v4

      # Extract branch name
      - name: Get Branch
        id: vars
        run: |
          BRANCH=${GITHUB_REF#refs/heads/}
          echo "branch=$BRANCH" >> $GITHUB_OUTPUT

      # Map feature → WIP branch
      - name: Map WIP Branch
        id: map
        run: |
          BRANCH="${{ steps.vars.outputs.branch }}"

          if [[ $BRANCH == *"api"* && $BRANCH == *"team1"* ]]; then
            TARGET="wip/api-team1"
          elif [[ $BRANCH == *"ui"* && $BRANCH == *"team1"* ]]; then
            TARGET="wip/ui-team1"
          elif [[ $BRANCH == *"api"* && $BRANCH == *"team2"* ]]; then
            TARGET="wip/api-team2"
          elif [[ $BRANCH == *"api"* && $BRANCH == *"team3"* ]]; then
            TARGET="wip/api-team3"
          else
            echo "❌ Cannot determine target WIP branch"
            exit 1
          fi

          echo "target=$TARGET" >> $GITHUB_OUTPUT

      # Conflict detection (robust + safe)
      - name: Check Conflict with WIP
        run: |
          TARGET="${{ steps.map.outputs.target }}"

          git fetch origin $TARGET

          # Create temp branch for safe merge simulation
          git checkout -b temp-merge-check

          # Try merge (handles unrelated history too)
          if git merge origin/$TARGET --no-commit --no-ff --allow-unrelated-histories; then
            echo "✅ No conflict"
          else
            echo "❌ Merge conflict detected. Fix before PR."
            exit 1
          fi

      # Create PR (no approval, no notify, pipeline ends here)
      - name: Create PR
        uses: peter-evans/create-pull-request@v5
        with:
          base: ${{ steps.map.outputs.target }}
          title: "Feature → WIP: ${{ steps.vars.outputs.branch }}"
          body: |
            Source: ${{ steps.vars.outputs.branch }}
            Target: ${{ steps.map.outputs.target }}

          labels: |
            feature