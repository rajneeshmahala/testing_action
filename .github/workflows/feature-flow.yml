name: Feature → WIP PR

on:
  push:
    branches:
      - 'feature/*'

permissions:
  contents: write
  pull-requests: write

jobs:
  create-pr:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Extract branch name
      - name: Get Branch
        id: vars
        run: |
          BRANCH=${GITHUB_REF#refs/heads/}
          echo "branch=$BRANCH" >> $GITHUB_OUTPUT

      # Map feature → WIP
      - name: Map WIP Branch
        id: map
        run: |
          BRANCH="${{ steps.vars.outputs.branch }}"

          if [[ $BRANCH == *"api"* && $BRANCH == *"team1"* ]]; then
            TARGET="wip/api-team1"
          elif [[ $BRANCH == *"ui"* && $BRANCH == *"team1"* ]]; then
            TARGET="wip/ui-team1"
          elif [[ $BRANCH == *"api"* && $BRANCH == *"team2"* ]]; then
            TARGET="wip/api-team2"
          elif [[ $BRANCH == *"api"* && $BRANCH == *"team3"* ]]; then
            TARGET="wip/api-team3"
          else
            echo "❌ Cannot determine target WIP branch"
            exit 1
          fi

          echo "target=$TARGET" >> $GITHUB_OUTPUT

      # Merge conflict check
      - name: Check Conflict with WIP
        run: |
          TARGET="${{ steps.map.outputs.target }}"

          git fetch origin $TARGET

          # Try merge simulation
          if git merge origin/$TARGET --no-commit --no-ff; then
            echo "✅ No conflict"
          else
            echo "❌ Merge conflict detected. Fix required before PR."
            exit 1
          fi

      # Create PR (no approval logic, no extras)
      - name: Create PR
        uses: peter-evans/create-pull-request@v5
        with:
          base: ${{ steps.map.outputs.target }}
          title: "Feature → WIP: ${{ steps.vars.outputs.branch }}"
          body: |
            Source: ${{ steps.vars.outputs.branch }}
            Target: ${{ steps.map.outputs.target }}