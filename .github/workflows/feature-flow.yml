name: Feature → WIP PR

on:
  push:
    branches:
      - 'feature/*'

permissions:
  contents: write
  pull-requests: write

jobs:
  create-pr:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Extract branch
      - name: Get Branch
        id: vars
        run: |
          BRANCH=${GITHUB_REF#refs/heads/}
          echo "branch=$BRANCH" >> $GITHUB_OUTPUT

      # Map feature → WIP
      - name: Map WIP Branch
        id: map
        run: |
          BRANCH="${{ steps.vars.outputs.branch }}"

          if [[ $BRANCH == *"api"* && $BRANCH == *"team1"* ]]; then
            TARGET="wip/api-team1"
          elif [[ $BRANCH == *"ui"* && $BRANCH == *"team1"* ]]; then
            TARGET="wip/ui-team1"
          elif [[ $BRANCH == *"api"* && $BRANCH == *"team2"* ]]; then
            TARGET="wip/api-team2"
          elif [[ $BRANCH == *"api"* && $BRANCH == *"team3"* ]]; then
            TARGET="wip/api-team3"
          else
            echo "❌ Cannot determine target WIP branch"
            exit 1
          fi

          echo "target=$TARGET" >> $GITHUB_OUTPUT

      # Extract commit author (for audit)
      - name: Get Commit Author
        id: author
        run: |
          NAME=$(git log -1 --pretty=format:'%an')
          EMAIL=$(git log -1 --pretty=format:'%ae')

          echo "name=$NAME" >> $GITHUB_OUTPUT
          echo "email=$EMAIL" >> $GITHUB_OUTPUT

      # Configure Git with real author
      - name: Configure Git
        run: |
          git config --global user.name "${{ steps.author.outputs.name }}"
          git config --global user.email "${{ steps.author.outputs.email }}"

      # Conflict detection
      - name: Check Conflict with WIP
        run: |
          TARGET="${{ steps.map.outputs.target }}"

          git fetch origin $TARGET

          git checkout -b temp-merge-check

          if git merge origin/$TARGET --no-commit --no-ff --allow-unrelated-histories; then
            echo "✅ No conflict"
          else
            echo "❌ Merge conflict detected. Fix before PR."
            exit 1
          fi

      # Create PR (with audit info)
      - name: Create PR
        uses: peter-evans/create-pull-request@v5
        with:
          base: ${{ steps.map.outputs.target }}
          title: "Feature → WIP: ${{ steps.vars.outputs.branch }}"
          body: |
            🔹 Auto-created PR

            Source Branch: ${{ steps.vars.outputs.branch }}
            Target Branch: ${{ steps.map.outputs.target }}

            --- Audit Info ---
            Triggered By (GitHub Actor): ${{ github.actor }}
            Commit Author: ${{ steps.author.outputs.name }}
            Author Email: ${{ steps.author.outputs.email }}
            Commit SHA: ${{ github.sha }}

          labels: |
            feature