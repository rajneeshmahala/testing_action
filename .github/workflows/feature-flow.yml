# ──────────────────────────────────────────────────────────────────────────────
# WORKFLOW 2: PR approved → re-check conflicts → auto-merge into WIP branch
# Save as: .github/workflows/feature-auto-merge.yml
# ──────────────────────────────────────────────────────────────────────────────
name: Feature — Auto-Merge on Approval

on:
  pull_request_review:
    types: [submitted]

permissions:
  contents: write
  pull-requests: write

jobs:
  auto-merge:
    runs-on: ubuntu-latest

    # Only trigger when: review state is approved AND head is a feature branch
    if: |
      github.event.review.state == 'approved' &&
      startsWith(github.event.pull_request.head.ref, 'feature/')

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure Git Identity
        run: |
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config user.name  "github-actions[bot]"

      # ── Read PR context from the review event ────────────────────────────────
      - name: Get PR Details
        id: pr
        run: |
          SOURCE="${{ github.event.pull_request.head.ref }}"
          TARGET="${{ github.event.pull_request.base.ref }}"
          PR_NUMBER="${{ github.event.pull_request.number }}"
          APPROVER="${{ github.event.review.user.login }}"

          echo "source=$SOURCE"       >> "$GITHUB_OUTPUT"
          echo "target=$TARGET"       >> "$GITHUB_OUTPUT"
          echo "pr_number=$PR_NUMBER" >> "$GITHUB_OUTPUT"
          echo "approver=$APPROVER"   >> "$GITHUB_OUTPUT"

          echo "PR #$PR_NUMBER: $SOURCE → $TARGET (approved by $APPROVER)"

      # ── Re-check conflicts (another branch may have pushed since PR opened) ──
      - name: Re-check Conflicts Before Merge
        id: conflict
        run: |
          SOURCE="${{ steps.pr.outputs.source }}"
          TARGET="${{ steps.pr.outputs.target }}"

          git fetch origin "$SOURCE" "$TARGET"

          TMPDIR=$(mktemp -d)
          git worktree add "$TMPDIR" "origin/$TARGET"

          CONFLICT="false"
          pushd "$TMPDIR" > /dev/null
            if ! git merge --no-commit --no-ff "origin/$SOURCE" > /dev/null 2>&1; then
              CONFLICT="true"
            fi
            git merge --abort 2>/dev/null || true
          popd > /dev/null
          git worktree remove --force "$TMPDIR"

          echo "conflict=$CONFLICT" >> "$GITHUB_OUTPUT"

      # ── Block and comment if new conflict appeared after approval ────────────
      - name: Stop if Conflict Found
        if: steps.conflict.outputs.conflict == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh pr comment "${{ steps.pr.outputs.pr_number }}" \
            --body "⚠️ **Auto-merge blocked after approval.**
            A conflict was detected — likely because \`${{ steps.pr.outputs.target }}\` received new commits after this PR was approved.
            Please resolve the conflicts, then re-request review."
          echo "::error::Conflict after approval — merge aborted."
          exit 1

      # ── Merge into WIP branch ────────────────────────────────────────────────
      - name: Merge Feature into WIP
        id: merge
        run: |
          SOURCE="${{ steps.pr.outputs.source }}"
          TARGET="${{ steps.pr.outputs.target }}"

          git fetch origin "$TARGET"
          git checkout "$TARGET"
          git merge --no-ff "origin/$SOURCE" \
            -m "chore: merge $SOURCE → $TARGET (PR #${{ steps.pr.outputs.pr_number }}, approved by ${{ steps.pr.outputs.approver }}) [skip ci]"
          git push origin "$TARGET"

          echo "Merged '$SOURCE' into '$TARGET'."

      # ── Leave a comment on the PR confirming the merge ───────────────────────
      - name: Comment Merge Confirmation on PR
        if: steps.merge.outcome == 'success'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh pr comment "${{ steps.pr.outputs.pr_number }}" \
            --body "✅ **Auto-merged** into \`${{ steps.pr.outputs.target }}\` after approval by @${{ steps.pr.outputs.approver }}."

      # ── Optionally close the PR after merge (clean up) ───────────────────────
      - name: Close PR After Merge
        if: steps.merge.outcome == 'success'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh pr close "${{ steps.pr.outputs.pr_number }}" \
            --comment "🔒 Closed automatically — changes merged into \`${{ steps.pr.outputs.target }}\`."

      