name: Feature → WIP PR

on:
  push:
    branches:
      - 'feature/*'

permissions:
  contents: write
  pull-requests: write

jobs:
  create-pr:
    runs-on: ubuntu-latest

    steps:
      # Checkout repo
      - name: Checkout
        uses: actions/checkout@v4

      # Get branch name
      - name: Get Branch Name
        id: vars
        run: |
          echo "branch=${GITHUB_REF#refs/heads/}" >> $GITHUB_OUTPUT

      # Map feature → WIP branch
      - name: Map WIP Branch
        id: map
        run: |
          BRANCH="${{ steps.vars.outputs.branch }}"

          if [[ $BRANCH == *"api"* && $BRANCH == *"team1"* ]]; then
            TARGET="wip/api-team1"
          elif [[ $BRANCH == *"ui"* && $BRANCH == *"team1"* ]]; then
            TARGET="wip/ui-team1"
          elif [[ $BRANCH == *"api"* && $BRANCH == *"team2"* ]]; then
            TARGET="wip/api-team2"
          elif [[ $BRANCH == *"api"* && $BRANCH == *"team3"* ]]; then
            TARGET="wip/api-team3"
          else
            echo "❌ Cannot determine WIP branch"
            exit 1
          fi

          echo "target=$TARGET" >> $GITHUB_OUTPUT

      # 🔥 SIMPLE & RELIABLE CONFLICT CHECK (NO MERGE COMMIT)
      - name: Check Conflict (Safe Method)
        run: |
          TARGET="${{ steps.map.outputs.target }}"

          git fetch origin $TARGET

          # Try dry-run merge (no commit, no identity issue)
          if git merge-tree $(git merge-base HEAD origin/$TARGET) HEAD origin/$TARGET | grep -q "<<<<<<<"; then
            echo "❌ Merge conflict detected with $TARGET"
            exit 1
          else
            echo "✅ No conflict"
          fi

      # Create PR
      - name: Create PR
        uses: peter-evans/create-pull-request@v5
        with:
          base: ${{ steps.map.outputs.target }}
          title: "Feature → WIP: ${{ steps.vars.outputs.branch }}"
          body: |
            Source: ${{ steps.vars.outputs.branch }}
            Target: ${{ steps.map.outputs.target }}

          labels: |
            feature
